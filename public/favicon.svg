<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Gear cog background -->
  <g opacity="0.5" fill="#94A3B8">
    <!-- Main gear circle -->
    <circle cx="50" cy="50" r="28"/>
    <!-- Inner hole -->
    <circle cx="50" cy="50" r="12" fill="white"/>
    <!-- Gear teeth -->
    <rect x="46" y="16" width="8" height="12" rx="2"/>
    <rect x="46" y="72" width="8" height="12" rx="2"/>
    <rect x="16" y="46" width="12" height="8" rx="2"/>
    <rect x="72" y="46" width="12" height="8" rx="2"/>
    <!-- Diagonal teeth -->
    <rect x="22" y="22" width="8" height="12" rx="2"
          transform="rotate(45 26 28)"/>
    <rect x="22" y="66" width="8" height="12" rx="2"
          transform="rotate(-45 26 72)"/>
    <rect x="66" y="22" width="8" height="12" rx="2"
          transform="rotate(-45 70 28)"/>
    <rect x="66" y="66" width="8" height="12" rx="2"
          transform="rotate(45 70 72)"/>
  </g>

  <!-- JS Initials -->
  <text
    x="50"
    y="63"
    text-anchor="middle"
    font-family="Inter, Arial, sans-serif"
    font-size="36"
    font-weight="700"
    fill="#2563EB"
    letter-spacing="-1"
  >JS</text>

</svg>