<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#F8FAFC"/>

  <!-- Head -->
  <circle cx="100" cy="72" r="32" fill="url(#avatarGrad)" opacity="0.2" filter="url(#shadow)"/>
  <circle cx="100" cy="72" r="24" fill="url(#avatarGrad)" opacity="0.4"/>
  <circle cx="100" cy="72" r="16" fill="url(#avatarGrad)"/>

  <!-- Shoulders / body -->
  <ellipse cx="100" cy="150" rx="45" ry="30" fill="url(#avatarGrad)" opacity="0.3" filter="url(#shadow)"/>
  <ellipse cx="100" cy="145" rx="35" ry="25" fill="url(#avatarGrad)" opacity="0.5"/>
  <ellipse cx="100" cy="140" rx="25" ry="18" fill="url(#avatarGrad)"/>

  <!-- Computer -->
  <rect x="85" y="155" width="30" height="20" rx="2" fill="#374151" filter="url(#shadow)"/>
  <rect x="87" y="157" width="26" height="14" rx="1" fill="#1F2937"/>
  <rect x="89" y="159" width="22" height="10" fill="#06B6D4" opacity="0.8"/>



</svg>